[pytest]
# Pytest configuration for victory_garden watering system tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.12

# Test paths
testpaths = tests

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Strict markers
    --strict-markers
    # Strict config
    --strict-config
    # Show extra test summary info
    -rfE

# Markers for test organization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for workflows
    slow: Tests that take longer to run

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting:
# addopts = --cov=watering --cov-report=term-missing --cov-report=html
